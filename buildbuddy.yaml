actions:
  - name: "Build and Test all targets"
    container_image: "ubuntu-22.04"
    triggers:
      push:
        branches:
          - "master" # <-- replace "main" with your main branch name
      pull_request:
        branches:
          - "*"
    steps:
      # TODO(#305): Don't require kicad system installation
      - run: 'sudo add-apt-repository ppa:kicad/kicad-10.0-releases'
      # TODO(#209): Don't require installing graphviz
      - run: 'sudo apt-get update && sudo apt-get install -y graphviz graphviz-dev libtinfo5 kicad'
      - run: './lint.sh --mode check'
      - run: 'bazel build //...'
      - run: 'bazel test //... --output_groups=-mypy'
    resource_requests:
      # The default 20GB was too small
      disk: 40GB
